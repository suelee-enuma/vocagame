<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VocaGame</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Noto+Sans+KR:wght@700;900&family=Noto+Sans+JP:wght@700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>

  <!-- SCREEN 1: Menu -->
  <section id="screen-menu" class="screen active">
    <div class="menu-container">
      <h1 class="game-title">VocaGame</h1>
      <p class="game-subtitle">English → <span class="subtitle-lang">한국어</span></p>

      <div class="mode-selector">
        <button class="mode-card" data-mode="1">
          <div class="mode-badge">
            <svg viewBox="0 0 100 100" class="mode-badge-svg">
              <circle cx="50" cy="50" r="46" fill="white" stroke="currentColor" stroke-width="5"/>
              <circle cx="30" cy="35" r="14" fill="none" stroke="currentColor" stroke-width="3.5"/>
              <text x="30" y="40" text-anchor="middle" fill="currentColor" font-size="16" font-weight="900" font-family="Nunito, sans-serif" class="badge-text-1">가</text>
              <circle cx="70" cy="35" r="14" fill="none" stroke="currentColor" stroke-width="3.5"/>
              <text x="70" y="40" text-anchor="middle" fill="currentColor" font-size="16" font-weight="900" font-family="Nunito, sans-serif" class="badge-text-2">나</text>
              <circle cx="50" cy="68" r="14" fill="currentColor"/>
              <text x="50" y="73" text-anchor="middle" fill="white" font-size="16" font-weight="900" font-family="Nunito, sans-serif" class="badge-text-3">다</text>
            </svg>
          </div>
          <div class="mode-text">
            <span class="mode-name">Text Quiz</span>
            <span class="mode-desc" data-ko="뜻 고르기" data-ja="意味を選ぶ">뜻 고르기</span>
          </div>
        </button>
        <button class="mode-card" data-mode="2">
          <div class="mode-badge">
            <svg viewBox="0 0 100 100" class="mode-badge-svg">
              <circle cx="50" cy="50" r="46" fill="white" stroke="currentColor" stroke-width="5"/>
              <circle cx="28" cy="30" r="5" fill="currentColor"/>
              <circle cx="72" cy="30" r="5" fill="currentColor"/>
              <circle cx="28" cy="74" r="5" fill="currentColor"/>
              <circle cx="72" cy="74" r="5" fill="currentColor"/>
              <text x="50" y="62" text-anchor="middle" fill="currentColor" font-size="38" font-weight="900" font-family="Nunito, sans-serif">A</text>
            </svg>
          </div>
          <div class="mode-text">
            <span class="mode-name">Image Quiz</span>
            <span class="mode-desc" data-ko="이미지 고르기" data-ja="画像を選ぶ">이미지 고르기</span>
          </div>
        </button>
        <button class="mode-card" data-mode="3">
          <div class="mode-badge">
            <svg viewBox="0 0 100 100" class="mode-badge-svg">
              <circle cx="50" cy="50" r="46" fill="white" stroke="currentColor" stroke-width="5"/>
              <circle cx="33" cy="35" r="14" fill="none" stroke="currentColor" stroke-width="3.5"/>
              <text x="33" y="40" text-anchor="middle" fill="currentColor" font-size="16" font-weight="900" font-family="Nunito, sans-serif">C</text>
              <circle cx="67" cy="35" r="14" fill="none" stroke="currentColor" stroke-width="3.5"/>
              <text x="67" y="40" text-anchor="middle" fill="currentColor" font-size="16" font-weight="900" font-family="Nunito, sans-serif">R</text>
              <circle cx="50" cy="68" r="14" fill="none" stroke="currentColor" stroke-width="3.5"/>
              <line x1="42" y1="60" x2="58" y2="76" stroke="currentColor" stroke-width="3.5" stroke-linecap="round"/>
              <line x1="58" y1="60" x2="42" y2="76" stroke="currentColor" stroke-width="3.5" stroke-linecap="round"/>
            </svg>
          </div>
          <div class="mode-text">
            <span class="mode-name">Spell It</span>
            <span class="mode-desc" data-ko="철자 맞추기" data-ja="スペルを当てる">철자 맞추기</span>
          </div>
        </button>
        <button class="mode-card" data-mode="4">
          <div class="mode-badge">
            <svg viewBox="0 0 100 100" class="mode-badge-svg">
              <circle cx="50" cy="50" r="46" fill="white" stroke="currentColor" stroke-width="5"/>
              <!-- Clock face dots at 12, 3, 6, 9 -->
              <circle cx="50" cy="14" r="3.5" fill="currentColor"/>
              <circle cx="86" cy="50" r="3.5" fill="currentColor"/>
              <circle cx="50" cy="86" r="3.5" fill="currentColor"/>
              <circle cx="14" cy="50" r="3.5" fill="currentColor"/>
              <!-- Minute hand -->
              <line x1="50" y1="50" x2="50" y2="22" stroke="currentColor" stroke-width="4" stroke-linecap="round"/>
              <!-- Hour hand -->
              <line x1="50" y1="50" x2="68" y2="38" stroke="currentColor" stroke-width="4.5" stroke-linecap="round"/>
              <!-- Center dot -->
              <circle cx="50" cy="50" r="4" fill="currentColor"/>
            </svg>
          </div>
          <div class="mode-text">
            <span class="mode-name">Timer</span>
            <span class="mode-desc" data-ko="시간 도전" data-ja="タイムアタック">시간 도전</span>
          </div>
        </button>
      </div>
    </div>
  </section>

  <!-- SCREEN 2: Game -->
  <section id="screen-game" class="screen">
    <div class="game-hud">
      <div class="progress-bar">
        <div class="progress-fill"></div>
      </div>
      <div class="timer-display hidden">
        <span class="timer-icon">&#9201;</span>
        <span class="timer-seconds">60</span>
      </div>
      <div class="score-display">
        <span class="score-correct">0</span>
        <span class="score-separator"> / </span>
        <span class="score-total">0</span>
      </div>
    </div>

    <div class="question-area">
      <div class="prompt-word"></div>
    </div>

    <div class="options-area"></div>

    <button class="btn-back" aria-label="Back to menu">←</button>
  </section>

  <!-- SCREEN 3: Results -->
  <section id="screen-results" class="screen">
    <div class="results-container">
      <h2 class="results-title">Round Complete!</h2>
      <div class="results-score">
        <div class="score-circle">
          <span class="score-percentage">0%</span>
        </div>
      </div>
      <div class="results-stats">
        <div class="stat">
          <span class="stat-value correct-count">0</span>
          <span class="stat-label">Correct</span>
        </div>
        <div class="stat">
          <span class="stat-value incorrect-count">0</span>
          <span class="stat-label">Incorrect</span>
        </div>
      </div>
      <div class="results-actions">
        <button class="btn-replay">Play Again</button>
        <button class="btn-menu">Change Mode</button>
      </div>
    </div>
  </section>

  <!-- Floating Language Toggle -->
  <button class="lang-toggle" aria-label="Change language">
    <svg viewBox="0 0 100 100" class="lang-toggle-svg" id="flag-korean">
      <circle cx="50" cy="50" r="46" fill="#FFFFFF" stroke="#2c3e50" stroke-width="4.5"/>
      <!-- Taegeuk (S-curve arc paths) -->
      <path d="M30,50 A20,20 0 1,1 70,50 A10,10 0 0,1 50,50 A10,10 0 0,0 30,50 Z" fill="#CD2E3A"/>
      <path d="M70,50 A20,20 0 1,1 30,50 A10,10 0 0,1 50,50 A10,10 0 0,0 70,50 Z" fill="#0047A0"/>
      <!-- 건 ☰ upper-left: 3 solid -->
      <g transform="rotate(-45, 50, 50)">
        <rect x="43" y="13" width="14" height="2.5" fill="#222"/><rect x="43" y="17.5" width="14" height="2.5" fill="#222"/><rect x="43" y="22" width="14" height="2.5" fill="#222"/>
      </g>
      <!-- 감 ☵ upper-right: broken-solid-broken -->
      <g transform="rotate(45, 50, 50)">
        <rect x="43" y="13" width="5.5" height="2.5" fill="#222"/><rect x="51.5" y="13" width="5.5" height="2.5" fill="#222"/>
        <rect x="43" y="17.5" width="14" height="2.5" fill="#222"/>
        <rect x="43" y="22" width="5.5" height="2.5" fill="#222"/><rect x="51.5" y="22" width="5.5" height="2.5" fill="#222"/>
      </g>
      <!-- 곤 ☷ lower-right: 3 broken -->
      <g transform="rotate(135, 50, 50)">
        <rect x="43" y="13" width="5.5" height="2.5" fill="#222"/><rect x="51.5" y="13" width="5.5" height="2.5" fill="#222"/>
        <rect x="43" y="17.5" width="5.5" height="2.5" fill="#222"/><rect x="51.5" y="17.5" width="5.5" height="2.5" fill="#222"/>
        <rect x="43" y="22" width="5.5" height="2.5" fill="#222"/><rect x="51.5" y="22" width="5.5" height="2.5" fill="#222"/>
      </g>
      <!-- 리 ☲ lower-left: solid-broken-solid -->
      <g transform="rotate(225, 50, 50)">
        <rect x="43" y="13" width="14" height="2.5" fill="#222"/>
        <rect x="43" y="17.5" width="5.5" height="2.5" fill="#222"/><rect x="51.5" y="17.5" width="5.5" height="2.5" fill="#222"/>
        <rect x="43" y="22" width="14" height="2.5" fill="#222"/>
      </g>
    </svg>
    <svg viewBox="0 0 100 100" class="lang-toggle-svg hidden" id="flag-japanese">
      <circle cx="50" cy="50" r="46" fill="#FFFFFF" stroke="#2c3e50" stroke-width="4.5"/>
      <!-- Japanese flag: Hinomaru -->
      <circle cx="50" cy="50" r="16" fill="#BC002D"/>
    </svg>
  </button>

  <script src="js/data.js?v=2"></script>
  <script src="js/state.js?v=2"></script>
  <script src="js/ui.js?v=2"></script>
  <script src="js/modes/textChoice.js?v=2"></script>
  <script src="js/modes/imageChoice.js?v=2"></script>
  <script src="js/modes/letterArrange.js?v=2"></script>
  <script src="js/modes/timer.js?v=2"></script>
  <script src="js/game.js?v=2"></script>
  <script src="js/app.js?v=2"></script>
</body>
</html>
